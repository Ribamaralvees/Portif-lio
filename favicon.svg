<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f1422"/>
      <stop offset="100%" stop-color="#0A0F1E"/>
    </linearGradient>
    <!-- subtle inner glow on bottom-left -->
    <radialGradient id="glow" cx="20%" cy="80%" r="60%">
      <stop offset="0%" stop-color="#059669" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#059669" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>
  <rect width="512" height="512" rx="112" ry="112" fill="url(#glow)"/>

  <!-- Subtle top edge highlight -->
  <rect x="1" y="1" width="510" height="2" rx="1" fill="white" fill-opacity="0.06"/>

  <!-- "R" letter -->
  <text x="60" y="348"
    font-family="Georgia, serif"
    font-size="310"
    font-weight="700"
    fill="white"
    letter-spacing="-12">R</text>

  <!-- "A" letter — slightly offset for layered look -->
  <text x="218" y="348"
    font-family="Georgia, serif"
    font-size="310"
    font-weight="700"
    fill="white"
    fill-opacity="0.92"
    letter-spacing="-12">A</text>

  <!-- Green accent dot -->
  <circle cx="428" cy="104" r="38" fill="#059669"/>
  <circle cx="428" cy="104" r="28" fill="#10b981"/>
</svg>